<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 課程紀錄收費單自動產生器</title>
    <!-- Import Noto Sans TC Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Load Tesseract.js CDN for Client-Side OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #06c755; /* LINE Green */
            --primary-hover: #05b04b;
            --primary-light: #e6f9ee;
            --dark-blue: #1e293b;
            --card-bg: #ffffff;
            --neutral-bg: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            color: var(--dark-blue);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--neutral-bg);
            padding-bottom: 12px;
        }

        /* Tabs Style */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }

        .tab-btn.active {
            background-color: var(--primary-light);
            color: var(--primary-hover);
            font-weight: 700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Dropzone / Upload Area */
        .dropzone {
            border: 3px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: var(--neutral-bg);
            cursor: pointer;
            transition: var(--transition);
        }

        .dropzone:hover {
            border-color: var(--primary);
            background: #f0fdf4;
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .dropzone-text {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .dropzone-subtext {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Preview Image */
        #imagePreviewContainer {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* OCR Progress */
        .progress-bar-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }

        /* Text Inputs */
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            resize: vertical;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.15);
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 576px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--dark-blue);
        }

        select, input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
            background: #ffffff;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        /* Table Style */
        .table-container {
            margin-top: 25px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.05rem;
        }

        th {
            background-color: var(--neutral-bg);
            font-weight: 700;
            color: var(--dark-blue);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .table-row-input {
            width: 100%;
            border: none;
            padding: 6px;
            background: transparent;
            font-size: 1.05rem;
        }

        .table-row-input:focus {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
        }

        /* Visual Receipt Preview card (Right side) */
        .receipt-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 20px;
        }

        .receipt-header {
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .receipt-date {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .receipt-student {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .receipt-type {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .receipt-body {
            min-height: 180px;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .receipt-item:last-child {
            border-bottom: none;
        }

        .receipt-total-row {
            border-top: 2px dashed rgba(255, 255, 255, 0.2);
            margin-top: 20px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .receipt-total-val {
            color: #34d399; /* Emerald Green */
        }

        .receipt-bank {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .receipt-bank-title {
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .copy-receipt-btn {
            background-color: var(--primary);
            border: none;
            color: white;
            padding: 14px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: var(--transition);
        }

        .copy-receipt-btn:hover {
            background-color: var(--primary-hover);
        }

        /* Settings Dialog / Panel overlay */
        .settings-panel {
            background-color: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 30px;
            display: none;
            animation: fadeIn 0.25s ease-out;
        }

        .settings-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 12px;
            margin-top: 18px;
        }

        .settings-btn {
            background-color: var(--dark-blue);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .settings-btn:hover {
            background-color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LINE 課程紀錄收費單自動產生器</h1>
        <p>安全防洩版：所有名單與帳戶資訊皆安全儲存於您本地的手機/電腦中，不經由網路伺服器</p>
    </div>

    <div class="main-container">
        <!-- Left Side: Inputs & OCR -->
        <div>
            <!-- Settings Card -->
            <div class="settings-panel" id="settingsPanel">
                <div class="card-title" style="border:none; margin-bottom:10px; padding:0;">
                    <span>⚙️ 系統設定 (將安全儲存在本機)</span>
                    <button class="settings-btn" onclick="toggleSettings()">關閉設定</button>
                </div>
                
                <div class="settings-section-title" style="margin-top:0;">1. 🏦 轉帳帳戶資訊</div>
                <textarea id="settingsBankInfo" style="height:80px;" placeholder="例如：&#10;代碼：808 玉山銀行&#10;帳號：0060979298477"></textarea>

                <div class="settings-section-title">2. 👥 學生名冊與時薪對照</div>
                <div id="settingsStudentsList" style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;">
                    <!-- Dynamically generated student inputs -->
                </div>
                <button class="btn btn-secondary" style="padding:6px 14px; font-size:0.9rem;" onclick="addStudentInput()">＋ 新增學生資料</button>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
                </div>
            </div>

            <!-- Step 1: Input -->
            <div class="card">
                <div class="card-title">
                    <span>第一步：上傳截圖 或 貼上文字</span>
                    <button class="settings-btn" style="background-color: var(--primary);" onclick="toggleSettings()">⚙️ 設定您的學生與帳戶</button>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('ocrTab', this)">截圖辨識 (OCR)</button>
                    <button class="tab-btn" onclick="switchTab('pasteTab', this)">文字直接貼上</button>
                </div>

                <!-- Tab 1: OCR -->
                <div id="ocrTab" class="tab-content active">
                    <div class="dropzone" id="dropzone" onclick="triggerFileInput()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                        <div class="dropzone-icon">📷</div>
                        <div class="dropzone-text">將 LINE 課程紀錄截圖拖放到這裡，或點擊選擇檔案</div>
                        <div class="dropzone-subtext">支援複製後直接 Ctrl+V 貼上圖片</div>
                        <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="handleFileSelect(event)">
                    </div>

                    <div id="imagePreviewContainer">
                        <img id="imagePreview" src="">
                    </div>

                    <div class="progress-bar-container" id="progressBarContainer">
                        <div class="progress-bar-label">
                            <span id="progressStatus">正在載入辨識引擎...</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progressBarFill"></div>
                        </div>
                    </div>
                </div>

                <!-- Tab 2: Paste -->
                <div id="pasteTab" class="tab-content">
                    <textarea id="pasteTextArea" placeholder="在此處貼上您從 LINE 複製的課程紀錄文字...&#10;例如：&#10;6/2 國一 1.5小時&#10;6/9 國一 1.5小時&#10;講義 290元"></textarea>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="parsePastedText()">開始解析文字</button>
                    </div>
                </div>
            </div>

            <!-- Step 2: Parsed Result Editing -->
            <div class="card">
                <div class="card-title">第二步：選擇學生與校對明細</div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentSelect">選擇學生</label>
                        <select id="studentSelect" onchange="handleStudentChange()">
                            <option value="">-- 請先去設定中加入學生 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="billingMonth">收費月份</label>
                        <input type="month" id="billingMonth" onchange="updateMonthDisplay()">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentRate">時薪設定 (元/小時)</label>
                        <input type="number" id="studentRate" value="1000" oninput="calculateTotal()">
                    </div>
                    <div class="form-group">
                        <label for="studentSubject">課程類型/備註</label>
                        <input type="text" id="studentSubject" value="國一 1對1" oninput="updateReceiptHeader()">
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 25%;">日期</th>
                                <th style="width: 45%;">課程內容 / 項目</th>
                                <th style="width: 15%;">時數</th>
                                <th style="width: 15%;">費用</th>
                                <th style="width: 5%;">刪除</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody">
                            <!-- Rows dynamically populated -->
                        </tbody>
                    </table>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="addNewRow()">＋ 新增手動欄位</button>
                </div>
            </div>
        </div>

        <!-- Right Side: Live Visual Receipt Card -->
        <div>
            <div class="receipt-card">
                <div class="receipt-header">
                    <div class="receipt-date" id="receiptMonthDisplay">2026/06</div>
                    <div class="receipt-student" id="receiptStudentDisplay">請選擇學生</div>
                    <div class="receipt-type" id="receiptTypeDisplay">課程收費單</div>
                </div>

                <div class="receipt-body" id="receiptItemsDisplay">
                    <div style="color: #94a3b8; text-align: center; padding-top: 60px;">請於左側輸入資料以產生明細</div>
                </div>

                <div class="receipt-total-row">
                    <span>應繳金額總計</span>
                    <span class="receipt-total-val" id="receiptTotalDisplay">$0</span>
                </div>

                <div class="receipt-bank">
                    <div class="receipt-bank-title">🏦 轉帳資訊</div>
                    <div id="receiptBankDisplay">（請於系統設定中輸入您的轉帳帳號）</div>
                </div>

                <button class="copy-receipt-btn" onclick="copyReceiptText()">複製收費單文字明細</button>
            </div>
        </div>
    </div>

    <script>
        // Default empty structure for local storage
        let studentProfiles = {};
        let bankInfoText = "代碼：000 某某銀行\n帳號：1234-5678-9012";

        let parsedItems = [];

        // Load settings from localStorage
        function loadSettings() {
            const saved = localStorage.getItem('line_billing_settings');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    studentProfiles = data.profiles || {};
                    bankInfoText = data.bankInfo || "";
                } catch (e) {
                    console.error("Error parsing settings:", e);
                }
            } else {
                // If first time open, preload some mock examples for guidance
                studentProfiles = {
                    "範例學生 A": { rate: 1000, subject: "國一 1對1" },
                    "範例學生 B": { rate: 900, subject: "國二 一對一" }
                };
                bankInfoText = "代碼：808 玉山銀行\n帳號：0060979298477";
                saveToLocalStorage();
            }

            // Update UI components
            document.getElementById('receiptBankDisplay').innerText = bankInfoText;
            populateStudentSelect();
        }

        function saveToLocalStorage() {
            const data = {
                profiles: studentProfiles,
                bankInfo: bankInfoText
            };
            localStorage.setItem('line_billing_settings', JSON.stringify(data));
        }

        // Toggle Settings Display
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                // Load values to inputs
                document.getElementById('settingsBankInfo').value = bankInfoText;
                renderSettingsStudents();
            } else {
                panel.style.display = 'none';
            }
        }

        // Populate drop-down select
        function populateStudentSelect() {
            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">-- 請選擇學生 --</option>';
            
            Object.keys(studentProfiles).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = `${name} (${studentProfiles[name].subject} $${studentProfiles[name].rate}/hr)`;
                select.appendChild(opt);
            });
        }

        // Render Student Inputs in Settings panel
        function renderSettingsStudents() {
            const container = document.getElementById('settingsStudentsList');
            container.innerHTML = '';

            Object.keys(studentProfiles).forEach((name) => {
                const profile = studentProfiles[name];
                addStudentRowInput(container, name, profile.rate, profile.subject);
            });

            if (Object.keys(studentProfiles).length === 0) {
                addStudentRowInput(container, "", 1000, "");
            }
        }

        function addStudentInput() {
            const container = document.getElementById('settingsStudentsList');
            addStudentRowInput(container, "", 1000, "");
        }

        function addStudentRowInput(container, name, rate, subject) {
            const div = document.createElement('div');
            div.className = 'student-setting-row';
            div.style.display = 'grid';
            div.style.gridTemplateColumns = '1.2fr 0.8fr 1.5fr auto';
            div.style.gap = '10px';
            div.style.alignItems = 'center';

            div.innerHTML = `
                <input type="text" placeholder="學生姓名" class="set-student-name" value="${name}" style="padding:6px; font-size:0.95rem;">
                <input type="number" placeholder="時薪" class="set-student-rate" value="${rate}" style="padding:6px; font-size:0.95rem;">
                <input type="text" placeholder="課程類型" class="set-student-subject" value="${subject}" style="padding:6px; font-size:0.95rem;">
                <button class="delete-btn" onclick="this.parentElement.remove()" style="font-size:1.1rem; padding:0 5px;">🗑️</button>
            `;
            container.appendChild(div);
        }

        // Save Settings from settings panel to LocalStorage
        function saveSettings() {
            bankInfoText = document.getElementById('settingsBankInfo').value;
            
            // Gather students
            const newProfiles = {};
            const rows = document.querySelectorAll('.student-setting-row');
            
            rows.forEach(row => {
                const name = row.querySelector('.set-student-name').value.trim();
                const rate = parseFloat(row.querySelector('.set-student-rate').value) || 0;
                const subject = row.querySelector('.set-student-subject').value.trim();

                if (name.length > 0) {
                    newProfiles[name] = {
                        rate: rate,
                        subject: subject
                    };
                }
            });

            studentProfiles = newProfiles;
            saveToLocalStorage();
            loadSettings();
            
            alert("系統設定已儲存在您這台裝置上！");
            toggleSettings();
        }

        // Set Default Month
        document.getElementById('billingMonth').value = new Date().toISOString().slice(0, 7);

        // Handle Paste Event globally for OCR Tab
        window.addEventListener('paste', function(e) {
            if (document.getElementById('ocrTab').style.display !== 'none') {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.indexOf('image/') !== -1) {
                        const blob = item.getAsFile();
                        processImageFile(blob);
                    }
                }
            }
        });

        // Tab Switching
        function switchTab(tabId, btn) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // File Select Trigger
        function triggerFileInput() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                processImageFile(e.target.files[0]);
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) {
                processImageFile(e.dataTransfer.files[0]);
            }
        }

        // Process image upload & call Tesseract OCR
        function processImageFile(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const previewImg = document.getElementById('imagePreview');
                previewImg.src = event.target.result;
                document.getElementById('imagePreviewContainer').style.display = 'block';
                
                runOCR(event.target.result);
            };
            reader.readAsDataURL(file);
        }

        // Tesseract.js OCR Execution
        async function runOCR(imageSrc) {
            const container = document.getElementById('progressBarContainer');
            const fill = document.getElementById('progressBarFill');
            const status = document.getElementById('progressStatus');
            const percent = document.getElementById('progressPercent');

            container.style.display = 'block';
            fill.style.width = '0%';
            status.innerText = "正在載入辨識引擎...";
            percent.innerText = "0%";

            try {
                const worker = await Tesseract.createWorker('chi_tra');
                
                worker.logger = (m) => {
                    if (m.status === 'recognizing text') {
                        const progress = Math.round(m.progress * 100);
                        fill.style.width = progress + '%';
                        status.innerText = "正在掃描圖片文字...";
                        percent.innerText = progress + '%';
                    }
                };

                const ret = await worker.recognize(imageSrc);
                status.innerText = "辨識完成！";
                await worker.terminate();

                document.getElementById('pasteTextArea').value = ret.data.text;
                parseText(ret.data.text);
                
                switchTab('pasteTab', document.querySelectorAll('.tab-btn')[1]);
                
            } catch (err) {
                console.error(err);
                status.innerText = "辨識發生錯誤！建議使用「文字直接貼上」模式。";
            }
        }

        // Parse pasted text directly
        function parsePastedText() {
            const text = document.getElementById('pasteTextArea').value;
            parseText(text);
        }

        // Main Parsing Logic
        function parseText(text) {
            parsedItems = [];
            const lines = text.split('\n');
            
            const dateRegex = /((?:1[0-2]|[1-9])(?:\/|月)(?:[1-2][0-9]|3[0-1]|[1-9])(?:日)?)/;
            const hourRegex = /(\b[0-9]+(?:\.[0-9]+)?\s*(?:小時|h|hr|點)?\b)/i;
            const handoutRegex = /講義\s*[:：]?\s*([^\d\s]+)?\s*(\d+)/;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed.length === 0) return;

                const handoutMatch = trimmed.match(handoutRegex);
                if (handoutMatch) {
                    const name = handoutMatch[1] ? "講義: " + handoutMatch[1] : "講義書籍";
                    const price = parseFloat(handoutMatch[2]);
                    parsedItems.push({
                        date: "加購",
                        desc: name,
                        hours: "",
                        price: price,
                        isHandout: true
                    });
                    return;
                }

                const dateMatch = trimmed.match(dateRegex);
                if (dateMatch) {
                    const dateStr = dateMatch[1].replace('月', '/').replace('日', '');
                    
                    let hours = 1.5; 
                    const hourMatch = trimmed.match(hourRegex);
                    if (hourMatch) {
                        const hVal = parseFloat(hourMatch[1]);
                        if (!isNaN(hVal) && hVal > 0 && hVal < 10) {
                            hours = hVal;
                        }
                    }
                    
                    parsedItems.push({
                        date: dateStr,
                        desc: "", 
                        hours: hours,
                        price: 0, 
                        isHandout: false
                    });
                }
            });

            if (parsedItems.length === 0) {
                parsedItems.push({
                    date: "6/1",
                    desc: "",
                    hours: 1.5,
                    price: 0,
                    isHandout: false
                });
            }

            renderTable();
        }

        // Student selection trigger
        function handleStudentChange() {
            const select = document.getElementById('studentSelect');
            const name = select.value;
            
            if (name && studentProfiles[name]) {
                const profile = studentProfiles[name];
                document.getElementById('studentRate').value = profile.rate;
                document.getElementById('studentSubject').value = profile.subject;
                
                document.getElementById('receiptStudentDisplay').innerText = name;
                document.getElementById('receiptTypeDisplay').innerText = profile.subject + " 收費單";
            } else {
                document.getElementById('receiptStudentDisplay').innerText = "請選擇學生";
            }
            
            updateReceiptHeader();
            recalculatePrices();
            renderTable();
        }

        function updateReceiptHeader() {
            const name = document.getElementById('studentSelect').value || "學生姓名";
            const subject = document.getElementById('studentSubject').value || "國文課程";
            document.getElementById('receiptStudentDisplay').innerText = name + " 國文收費單";
            document.getElementById('receiptTypeDisplay').innerText = subject;
        }

        function updateMonthDisplay() {
            const val = document.getElementById('billingMonth').value;
            if (val) {
                const parts = val.split('-');
                document.getElementById('receiptMonthDisplay').innerText = parts[0] + "/" + parts[1];
            }
        }

        function recalculatePrices() {
            const rate = parseFloat(document.getElementById('studentRate').value) || 0;
            parsedItems.forEach(item => {
                if (!item.isHandout) {
                    item.price = item.hours * rate;
                }
            });
        }

        // Render interactive table
        function renderTable() {
            const body = document.getElementById('itemsTableBody');
            body.innerHTML = '';
            
            const subject = document.getElementById('studentSubject').value || "國文課程";
            recalculatePrices();

            parsedItems.forEach((item, idx) => {
                const tr = document.createElement('tr');
                const displayDesc = item.isHandout ? item.desc : (item.desc || subject);

                tr.innerHTML = `
                    <td>
                        <input type="text" class="table-row-input" value="${item.date}" onchange="updateItem(${idx}, 'date', this.value)">
                    </td>
                    <td>
                        <input type="text" class="table-row-input" value="${displayDesc}" onchange="updateItem(${idx}, 'desc', this.value)">
                    </td>
                    <td>
                        <input type="number" step="0.5" class="table-row-input" value="${item.hours}" ${item.isHandout ? 'disabled' : ''} onchange="updateItem(${idx}, 'hours', this.value)">
                    </td>
                    <td>
                        <input type="number" class="table-row-input" value="${item.price}" ${!item.isHandout ? 'disabled' : ''} onchange="updateItem(${idx}, 'price', this.value)">
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteRow(${idx})">🗑️</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            calculateTotal();
        }

        function updateItem(idx, field, value) {
            if (field === 'hours' || field === 'price') {
                parsedItems[idx][field] = parseFloat(value) || 0;
            } else {
                parsedItems[idx][field] = value;
            }
            renderTable();
        }

        function addNewRow() {
            parsedItems.push({
                date: "",
                desc: "",
                hours: 1.5,
                price: 0,
                isHandout: false
            });
            renderTable();
        }

        function deleteRow(idx) {
            parsedItems.splice(idx, 1);
            renderTable();
        }

        // Calculate and Render Receipt Total
        function calculateTotal() {
            let total = 0;
            let totalHours = 0;
            const itemsContainer = document.getElementById('receiptItemsDisplay');
            
            itemsContainer.innerHTML = '';
            recalculatePrices();

            parsedItems.forEach(item => {
                total += item.price;
                if (!item.isHandout) {
                    totalHours += item.hours;
                }

                const div = document.createElement('div');
                div.className = 'receipt-item';
                
                const leftLabel = item.isHandout ? item.date + " " + item.desc : item.date + " " + (item.desc || document.getElementById('studentSubject').value) + " (" + item.hours + "hr)";
                
                div.innerHTML = `
                    <span>${leftLabel}</span>
                    <span>$${item.price}</span>
                `;
                itemsContainer.appendChild(div);
            });

            document.getElementById('receiptTotalDisplay').innerText = "$" + total;
            
            if (parsedItems.length > 0) {
                const hrDiv = document.createElement('div');
                hrDiv.className = 'receipt-item';
                hrDiv.style.fontWeight = 'bold';
                hrDiv.style.borderTop = '1px dashed rgba(255, 255, 255, 0.1)';
                hrDiv.style.marginTop = '10px';
                hrDiv.style.paddingTop = '10px';
                hrDiv.innerHTML = `
                    <span>時數總計: ${totalHours}hr</span>
                    <span>學費合計: $${total - (parsedItems.filter(i=>i.isHandout).reduce((sum, i)=>sum+i.price, 0))}</span>
                `;
                itemsContainer.appendChild(hrDiv);
            }
        }

        // Copy plain text receipt to clipboard
        function copyReceiptText() {
            const student = document.getElementById('receiptStudentDisplay').innerText;
            const month = document.getElementById('receiptMonthDisplay').innerText;
            const subject = document.getElementById('receiptTypeDisplay').innerText;
            const rate = document.getElementById('studentRate').value;
            
            let text = `${month}  ${student}\n`;
            text += `上課紀錄 (${subject}，時薪：$${rate}/hr)\n`;
            text += `-------------------------------------\n`;
            
            let total = 0;
            let totalHours = 0;
            
            parsedItems.forEach(item => {
                total += item.price;
                if (item.isHandout) {
                    text += `${item.date}  ${item.desc} : $${item.price}\n`;
                } else {
                    text += `${item.date}  上課 (${item.hours}小時) : $${item.price}\n`;
                    totalHours += item.hours;
                }
            });
            
            text += `-------------------------------------\n`;
            text += `時數總計：${totalHours} 小時\n`;
            text += `應繳金額總計：$${total} 元\n\n`;
            text += `🏦 轉帳資訊\n`;
            text += bankInfoText + "\n";
            
            navigator.clipboard.writeText(text).then(() => {
                alert("收費單明細已複製到您的剪貼簿！可以直接貼到 LINE 給家長。");
            }).catch(err => {
                alert("複製失敗，請手動選取複製");
            });
        }

        // Init page
        loadSettings();
    </script>
</body>
</html>
