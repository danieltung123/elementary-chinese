<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時光歲月之卷：古代年齡代稱互動探索</title>
    <style>
        /* 載入古典與人文風 Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&family=Noto+Serif+TC:wght@400;700;900&display=swap');

        :root {
            --bg-scroll: #f4edd8; /* 古舊宣紙色 */
            --ink-black: #2c221a; /* 濃墨色 */
            --ink-gray: #7d6e61; /* 淡墨色 */
            --accent-red: #a63a3a; /* 朱砂紅 */
            --accent-gold: #cfa85c; /* 金泥色 */
            --font-classic: "Noto Serif TC", "Songti TC", "Heiti TC", serif;
            --font-brush: "Zhi Mang Xing", "Long Cang", "Ma Shan Zheng", cursive, serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-classic);
            background-color: #1e1915; /* 暗沉古檀木色底 */
            background-image: radial-gradient(rgba(197, 160, 89, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--ink-black);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 繪卷主體 */
        .scroll-container {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-scroll);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 40px 60px;
            position: relative;
            animation: unroll-clip 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s both;
            overflow: visible;
        }

        @keyframes unroll-clip {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
                clip-path: inset(0 50% 0 50%);
            }
            30% {
                opacity: 1;
                transform: translateY(0) scale(1);
                clip-path: inset(0 50% 0 50%);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                clip-path: inset(0 0% 0 0%);
            }
        }

        .scroll-rod-left, .scroll-rod-right {
            position: absolute;
            top: -15px;
            bottom: -15px;
            width: 22px;
            background: linear-gradient(to right, #2c1a10, #5a402d 40%, #8b6b55 60%, #5a402d 80%, #2c1a10);
            border-radius: 11px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .scroll-rod-left {
            left: 12px;
            animation: rod-left-unroll 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s both;
        }

        .scroll-rod-right {
            right: 12px;
            animation: rod-right-unroll 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s both;
        }

        @keyframes rod-left-unroll {
            0% {
                opacity: 0;
                left: 50%;
                transform: translateX(-50%);
            }
            30% {
                opacity: 1;
                left: 50%;
                transform: translateX(-50%);
            }
            100% {
                opacity: 1;
                left: 12px;
                transform: translateX(0);
            }
        }

        @keyframes rod-right-unroll {
            0% {
                opacity: 0;
                right: 50%;
                transform: translateX(50%);
            }
            30% {
                opacity: 1;
                right: 50%;
                transform: translateX(50%);
            }
            100% {
                opacity: 1;
                right: 12px;
                transform: translateX(0);
            }
        }

        .scroll-rod-left::before, .scroll-rod-left::after,
        .scroll-rod-right::before, .scroll-rod-right::after {
            content: "";
            position: absolute;
            width: 28px;
            height: 15px;
            left: -3px;
            background: radial-gradient(circle, #ffe699, #cfa85c 60%, #8a6421);
            border: 1px solid #8a6421;
            border-radius: 3px;
        }

        .scroll-rod-left::before, .scroll-rod-right::before { top: -10px; }
        .scroll-rod-left::after, .scroll-rod-right::after { bottom: -10px; }

        .fade-in-ink {
            animation: ink-reveal 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes ink-reveal {
            0% {
                opacity: 0;
                transform: translateY(8px);
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* 古風框線裝飾 */
        .scroll-border {
            border: 2px solid var(--ink-black);
            padding: 30px;
            position: relative;
            background-image: 
                linear-gradient(var(--ink-black) 1px, transparent 1px),
                linear-gradient(90deg, var(--ink-black) 1px, transparent 1px);
            background-size: 100% 100%;
            background-position: 0 0;
        }

        .scroll-border::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px dashed var(--accent-red);
            pointer-events: none;
        }

        /* 標題設計 */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: var(--font-brush);
            font-size: 4rem;
            color: var(--accent-red);
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--ink-gray);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 功能選單區 */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-magic {
            font-family: var(--font-classic);
            background: transparent;
            border: 2px solid var(--ink-black);
            color: var(--ink-black);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .btn-magic::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid var(--accent-red);
            top: 3px;
            left: 3px;
            transition: all 0.3s;
        }

        .btn-magic:hover {
            background: var(--ink-black);
            color: var(--bg-scroll);
        }

        .btn-magic:hover::after {
            top: 0; left: 0;
            border-color: var(--bg-scroll);
        }

        .btn-magic.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
        }

        .btn-magic.active::after {
            border-color: var(--ink-black);
        }

        /* 模組一：時光繪卷探索區 */
        .explore-section {
            display: block;
        }

        /* 輪播卡片展示區 */
        .card-stage {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px double var(--ink-black);
            border-radius: 12px;
            padding: 30px;
            min-height: 450px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            align-items: center;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .card-stage {
                grid-template-columns: 1fr;
            }
        }

        /* 卡片左側：圖像展示 */
        .image-box {
            border: 4px solid var(--ink-black);
            background: #fff;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .age-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 佔位手繪古典插圖樣式 */
        .placeholder-image {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f7f3e8 0%, #e2dac3 100%);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .placeholder-image::before {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(44, 34, 26, 0.15);
        }

        .placeholder-icon {
            font-size: 5rem;
            margin-bottom: 15px;
            filter: grayscale(0.2);
        }

        .placeholder-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--ink-gray);
            font-style: italic;
        }

        /* 卡片右側：文字介紹與讀音 */
        .info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px dashed var(--accent-red);
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-title {
            font-family: var(--font-classic);
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--ink-black);
            letter-spacing: 2px;
        }

        /* 注音標示區 */
        .info-zhuyin {
            background: #fff;
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 1.1rem;
            color: var(--accent-red);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .info-age-badge {
            background: var(--accent-gold);
            color: var(--ink-black);
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 1.1rem;
            border: 1px solid var(--ink-black);
        }

        .info-meaning-box {
            font-size: 1.25rem;
            line-height: 1.8;
            color: var(--ink-black);
            margin-bottom: 25px;
        }

        .info-meaning-box strong {
            color: var(--accent-red);
            font-size: 1.35rem;
            display: block;
            margin-bottom: 8px;
        }

        .info-detail-box {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--ink-gray);
            background: rgba(255,255,255,0.6);
            border-left: 4px solid var(--accent-gold);
            padding: 12px 18px;
            border-radius: 0 8px 8px 0;
        }

        /* 底部時光長河導航列 */
        .timeline-container {
            margin-top: 40px;
            position: relative;
            padding: 20px 0;
        }

        .timeline-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--ink-black);
            transform: translateY(-50%);
            z-index: 1;
        }

        .timeline-nodes {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .timeline-node {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-scroll);
            border: 3px solid var(--ink-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .timeline-node:hover {
            transform: scale(1.2);
            background: var(--accent-gold);
            border-color: var(--accent-red);
        }

        .timeline-node.active {
            background: var(--accent-red);
            border-color: var(--ink-black);
            color: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 15px rgba(166, 58, 58, 0.4);
        }

        .timeline-desc {
            position: absolute;
            top: 55px;
            font-size: 0.8rem;
            white-space: nowrap;
            color: var(--ink-gray);
            font-weight: 700;
        }

        /* 導覽按鈕 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-nav {
            background: transparent;
            border: 2px solid var(--ink-black);
            padding: 8px 20px;
            font-family: var(--font-classic);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .btn-nav:hover:not(:disabled) {
            background: var(--accent-gold);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 模組二：古代考功測驗區 */
        .quiz-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .quiz-intro {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 30px auto;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .quiz-intro p {
            margin-bottom: 15px;
        }

        .quiz-play-box {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ink-black);
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .quiz-progress {
            font-size: 1.2rem;
        }

        .quiz-score {
            font-size: 1.2rem;
            background: var(--accent-gold);
            padding: 5px 15px;
            border: 1px solid var(--ink-black);
            border-radius: 4px;
        }

        .question-card {
            background: #fff;
            border: 3px solid var(--ink-black);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 35px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .question-hint {
            font-size: 1rem;
            color: var(--ink-gray);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .question-main {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.6;
            color: var(--ink-black);
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .options-container {
                grid-template-columns: 1fr;
            }
        }

        .option-card {
            background: #fff;
            border: 2px solid var(--ink-black);
            border-radius: 8px;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 3px 3px 0px var(--ink-black);
        }

        .option-card:hover {
            background: #fdfbf7;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--ink-black);
        }

        .option-card:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--ink-black);
        }

        /* 答題反饋遮罩 */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 237, 216, 0.98);
            border-radius: 9px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .feedback-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .feedback-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .feedback-overlay.correct .feedback-title {
            color: #2b8a3e;
        }

        .feedback-overlay.incorrect .feedback-title {
            color: var(--accent-red);
        }

        .feedback-msg {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            max-width: 80%;
            text-align: center;
        }

        /* 結業報告 */
        .result-stage {
            display: none;
            text-align: center;
            padding: 30px;
            border: 4px double var(--ink-black);
            background: #fffdf9;
            border-radius: 12px;
            animation: fadeIn 0.8s ease;
        }

        .result-seal {
            font-family: var(--font-brush);
            font-size: 5rem;
            color: var(--accent-red);
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .result-content {
            font-size: 1.3rem;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .result-rank {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent-red);
            background: rgba(166, 58, 58, 0.08);
            display: inline-block;
            padding: 10px 30px;
            border: 2px dashed var(--accent-red);
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="scroll-rod-left"></div>
        <div class="scroll-rod-right"></div>
        <div class="scroll-border">
            <!-- 標頭 -->
            <header>
                <h1>時光歲月之卷</h1>
                <div class="subtitle">📜 探索古代年齡代稱的國學智慧 📜</div>
            </header>

            <!-- 模式選擇 -->
            <div class="mode-selector">
                <button class="btn-magic active" id="btn-explore" onclick="switchMode('explore')">時光探索</button>
                <button class="btn-magic" id="btn-quiz" onclick="switchMode('quiz')">古代考功</button>
            </div>

            <!-- 模組一：時光探索區 -->
            <div class="explore-section" id="explore-section">
                <div class="card-stage" id="card-stage">
                    <!-- 左側：圖片顯示區 -->
                    <div class="image-box" id="explore-image-box">
                        <!-- 動態插入圖片或佔位插圖 -->
                    </div>

                    <!-- 右側：資訊說明區 -->
                    <div class="info-box">
                        <div class="info-header">
                            <span class="info-title" id="explore-title">讀取中</span>
                            <span class="info-zhuyin" id="explore-zhuyin">
                                <span id="explore-zhuyin-text"></span>
                                
                            </span>
                            <span class="info-age-badge" id="explore-age"></span>
                        </div>
                        
                        <div class="info-detail-box" id="explore-detail"></div>
                    </div>
                </div>

                <!-- 導覽控制按鈕 -->
                <div class="nav-buttons">
                    <button class="btn-nav" id="btn-prev" onclick="changeAgeNode(-1)">◀ 前一階段</button>
                    <button class="btn-nav" id="btn-next" onclick="changeAgeNode(1)">下一階段 ▶</button>
                </div>

                <!-- 底部時光長河 Timeline -->
                <div class="timeline-container">
                    <div class="timeline-line"></div>
                    <div class="timeline-nodes" id="timeline-nodes">
                        <!-- 節點由 JS 渲染 -->
                    </div>
                </div>
            </div>

            <!-- 模組二：測驗考功區 -->
            <div class="quiz-section" id="quiz-section">
                <!-- 準備開始畫面 -->
                <div class="quiz-intro" id="quiz-intro">
                    <p>歡迎來到「古代考功測驗」！我們準備了 8 道隨機修辭與代稱題目，來檢驗你的年齡代稱功力。</p>
                    <p>在測驗中，你會需要根據<strong>情境故事描述</strong>或<strong>字面意思</strong>，找出對應的年齡代稱或年齡。</p>
                    <button class="btn-magic" onclick="startQuiz()" style="margin-top: 15px;">開啟考功測驗 ⚔️</button>
                </div>

                <!-- 答題進行畫面 -->
                <div class="quiz-play-box" id="quiz-play-box">
                    <div class="quiz-header">
                        <div class="quiz-progress" id="quiz-progress-text">進度：第 1 / 8 題</div>
                        <div class="quiz-score" id="quiz-score-text">得分：0</div>
                    </div>

                    <!-- 題目卡 -->
                    <div class="question-card" id="question-card">
                        <div class="question-hint" id="question-hint">線索提示</div>
                        <div class="question-main" id="question-text">讀取題目中...</div>

                        <!-- 答題反饋 -->
                        <div class="feedback-overlay" id="feedback-overlay">
                            <div class="feedback-title" id="feedback-title">答對了！</div>
                            <div class="feedback-msg" id="feedback-msg">詳細解析</div>
                            <button class="btn-magic" onclick="nextQuestion()">繼續下一題 🔮</button>
                        </div>
                    </div>

                    <!-- 選項按鈕區 -->
                    <div class="options-container" id="options-container">
                        <!-- 選項由 JS 產生 -->
                    </div>
                </div>

                <!-- 結業證書報告 -->
                <div class="result-stage" id="result-stage">
                    <div class="result-seal">印</div>
                    <h2 class="result-title">考功測驗·結業評語</h2>
                    <p class="result-content" id="result-content">測試結果載入中...</p>
                    
                    <br>
                    <button class="btn-magic" onclick="restartQuiz()">重新測驗 🔄</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. 年齡代稱資料庫 (已經由教育部重編國語辭典核對) ---
        const ageData = [
            {
                name: "周晬",
                zhuyin: "ㄓㄡ ㄗㄨㄟˋ",
                age: "1 歲",

        // --- 2. 時光探索邏輯 ---
        let currentNodeIndex = 0;

        function initExploreMode() {
            // 渲染底部時光節點
            const nodesContainer = document.getElementById('timeline-nodes');
            nodesContainer.innerHTML = '';
            
            ageData.forEach((data, index) => {
                const node = document.createElement('div');
                node.className = `timeline-node ${index === 0 ? 'active' : ''}`;
                node.id = `node-${index}`;
                node.innerText = data.icon;
                node.onclick = () => selectAgeNode(index);

                const desc = document.createElement('span');
                desc.className = 'timeline-desc';
                desc.innerText = data.name;
                node.appendChild(desc);

                nodesContainer.appendChild(node);
            });

            updateStage();
        }

        function selectAgeNode(index) {
            document.getElementById(`node-${currentNodeIndex}`).classList.remove('active');
            currentNodeIndex = index;
            document.getElementById(`node-${currentNodeIndex}`).classList.add('active');
            updateStage();
            


        }

        function changeAgeNode(direction) {
            const nextIndex = currentNodeIndex + direction;
            if (nextIndex >= 0 && nextIndex < ageData.length) {
                selectAgeNode(nextIndex);
            }
        }

        function updateStage() {
            const data = ageData[currentNodeIndex];
            
            // 更新右側文字
            document.getElementById('explore-title').innerText = data.name;
            document.getElementById('explore-zhuyin-text').innerText = data.zhuyin;
            document.getElementById('explore-age').innerText = data.age;
            
            document.getElementById('explore-detail').innerText = data.detail;

            // 更新左側圖片
            const imageBox = document.getElementById('explore-image-box');
            imageBox.innerHTML = '';
            if (data.image) {
                const img = document.createElement('img');
                img.className = 'age-image';
                img.src = `素材資料/${data.image}?v=style-unified-v3`;
                img.alt = data.name;
                imageBox.appendChild(img);
            } else {
                // 手繪古典佔位圖設計
                const holder = document.createElement('div');
                holder.className = 'placeholder-image';
                holder.innerHTML = `
                    <div class="placeholder-icon">${data.icon}</div>
                    <div style="font-size: 1.4rem; font-weight:900; margin-bottom:10px;">${data.name} 畫像</div>
                    <div class="placeholder-desc">「${data.meaning}」</div>
                `;
                imageBox.appendChild(holder);
            }

            // 更新導航按鈕狀態
            document.getElementById('btn-prev').disabled = (currentNodeIndex === 0);
            document.getElementById('btn-next').disabled = (currentNodeIndex === ageData.length - 1);
        }

        // --- 4. 切換模式 (探索/測驗) ---
        function switchMode(mode) {
            document.getElementById('btn-explore').classList.remove('active');
            document.getElementById('btn-quiz').classList.remove('active');
            document.getElementById('explore-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'none';

            if (mode === 'explore') {
                document.getElementById('btn-explore').classList.add('active');
                document.getElementById('explore-section').style.display = 'block';
            } else {
                document.getElementById('btn-quiz').classList.add('active');
                document.getElementById('quiz-section').style.display = 'block';
            }
        }

        // --- 5. 測驗考功邏輯 ---
        let quizQuestions = [];
        let currentQuizIndex = 0;
        let quizScore = 0;

        function generateQuizBank() {
            const bank = [];
            
            // 1. 給代稱選歲數 (16題)
            ageData.forEach(data => {
                const ageDistractors = ageData
                    .filter(d => d.age !== data.age)
                    .map(d => d.age);
                
                const uniqueDistractors = [...new Set(ageDistractors)]
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3);
                
                const options = [data.age, ...uniqueDistractors].sort(() => 0.5 - Math.random());

                bank.push({
                    hint: "【年齡換算題】請選出該代稱對應的確切歲數",
                    text: `請問古代年齡代稱中的「${data.name}（${data.zhuyin}）」是指幾歲？`,
                    options: options,
                    answer: data.age,
                    reason: `答對了！「${data.name}」指的是「${data.age}」。${data.detail}`
                });
            });

            // 2. 給歲數選代稱 (16題)
            ageData.forEach(data => {
                const nameDistractors = ageData
                    .filter(d => d.name !== data.name)
                    .map(d => d.name)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3);
                
                const options = [data.name, ...nameDistractors].sort(() => 0.5 - Math.random());

                bank.push({
                    hint: "【稱謂換算題】請選出該歲數或年齡層對應的古代代稱",
                    text: `請問古代稱呼「${data.age}」的年齡代稱是什麼？`,
                    options: options,
                    answer: data.name,
                    reason: `答對了！「${data.age}」在古代被稱為「${data.name}」。${data.detail}`
                });
            });

            // 3. 情境年齡大小比較題 (20題)
            const ageValues = {
                "周晬": 1, "襁褓": 1, "黃口": 6, "垂髫": 5, "總角": 11,
                "豆蔻": 13, "及笄": 15, "志學": 15, "弱冠": 20, "花信": 24,
                "而立": 30, "不惑": 40, "知命": 50, "花甲": 60, "耳順": 60,
                "古稀": 70, "耄耋": 85, "期頤": 100
            };
            const namesList = ["大民", "小草", "阿華", "小明", "志強", "雅婷", "美玲", "冠宇", "建國", "淑芬"];
            
            for (let i = 0; i < 20; i++) {
                const shuffledStages = Object.keys(ageValues).sort(() => 0.5 - Math.random());
                const stage1 = shuffledStages[0];
                const stage2 = shuffledStages[1];
                const stage3 = shuffledStages[2];
                
                const v1 = ageValues[stage1];
                const v2 = ageValues[stage2];
                const v3 = ageValues[stage3];
                
                const shuffledNames = [...namesList].sort(() => 0.5 - Math.random());
                const name1 = shuffledNames[0];
                const name2 = shuffledNames[1];
                const name3 = shuffledNames[2];
                
                const isMax = Math.random() > 0.5;
                let answerName = "";
                let conditionStr = "";
                
                if (isMax) {
                    conditionStr = "誰的年齡最大？";
                    const maxVal = Math.max(v1, v2, v3);
                    if (v1 === maxVal) answerName = name1;
                    else if (v2 === maxVal) answerName = name2;
                    else answerName = name3;
                } else {
                    conditionStr = "誰的年齡最小？";
                    const minVal = Math.min(v1, v2, v3);
                    if (v1 === minVal) answerName = name1;
                    else if (v2 === minVal) answerName = name2;
                    else answerName = name3;
                }
                
                const questionText = `情境描述：「${stage1}」的${name1}、「${stage2}」的${name2}，與「${stage3}」的${name3}聚在一起。請問他們之中，${conditionStr}`;
                const options = [name1, name2, name3].sort(() => 0.5 - Math.random());
                const reasonText = `答對了！${name1}是${stage1}（約 ${v1} 歲），${name2}是${stage2}（約 ${v2} 歲），${name3}是${stage3}（約 ${v3} 歲）。`;
                
                bank.push({
                    hint: "【情境年齡比較題】請根據代稱推算人物歲數並進行比較",
                    text: questionText,
                    options: options,
                    answer: answerName,
                    reason: reasonText
                });
            }

            // 4. 簡單數學運算題 (20題)
            for (let i = 0; i < 20; i++) {
                const shuffledStages = Object.keys(ageValues).sort(() => 0.5 - Math.random());
                const stage1 = shuffledStages[0];
                const stage2 = shuffledStages[1];
                
                const v1 = ageValues[stage1];
                const v2 = ageValues[stage2];
                
                const isAdd = Math.random() > 0.5;
                let ansValue = 0;
                let questionText = "";
                
                if (isAdd) {
                    ansValue = v1 + v2;
                    questionText = `數學挑戰：若小明今年正好是「${stage1}」之年，小華是「${stage2}」之年，請問兩人的歲數相加是多少歲？`;
                } else {
                    ansValue = Math.abs(v1 - v2);
                    questionText = `數學挑戰：若老王今年正好是「${stage1}」之年，小李是「${stage2}」之年，請問兩人的年齡相差多少歲？`;
                }
                
                const distractors = [];
                while (distractors.length < 3) {
                    const offset = Math.floor(Math.random() * 15) - 7;
                    const val = ansValue + offset;
                    if (val > 0 && val !== ansValue && !distractors.includes(val)) {
                        distractors.push(val);
                    }
                }
                
                const options = [ansValue.toString() + " 歲", ...distractors.map(d => d.toString() + " 歲")].sort(() => 0.5 - Math.random());
                
                bank.push({
                    hint: "【年齡數學計算題】請推算年齡代稱對應的數字並進行加減計算",
                    text: questionText,
                    options: options,
                    answer: ansValue.toString() + " 歲",
                    reason: `答對了！「${stage1}」是約 ${v1} 歲，「${stage2}」是約 ${v2} 歲。${isAdd ? (v1 + ' + ' + v2 + ' = ' + ansValue) : (Math.max(v1, v2) + ' - ' + Math.min(v1, v2) + ' = ' + ansValue)}。`
                });
            }

            return bank;
        }
function startQuiz() {
            const allQuestions = generateQuizBank();
            quizQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
            currentQuizIndex = 0;
            quizScore = 0;

            document.getElementById('quiz-intro').style.display = 'none';
            document.getElementById('quiz-play-box').style.display = 'block';
            document.getElementById('result-stage').style.display = 'none';

            loadQuizQuestion();
        }

        function loadQuizQuestion() {
            const q = quizQuestions[currentQuizIndex];
            
            const qBox = document.getElementById('quiz-play-box');
            qBox.classList.remove('fade-in-ink');
            void qBox.offsetWidth;
            qBox.classList.add('fade-in-ink');
            
            document.getElementById('quiz-progress-text').innerText = `進度：第 ${currentQuizIndex + 1} / 30 題`;
            document.getElementById('quiz-score-text').innerText = `得分：${Math.round((quizScore / 30) * 100)}`;

            document.getElementById('question-hint').innerText = q.hint;
            document.getElementById('question-text').innerText = q.text;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-card';
                btn.innerText = opt;
                btn.onclick = () => checkQuizAnswer(opt);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback-overlay').classList.remove('show');
        }

        function checkQuizAnswer(selected) {
            const q = quizQuestions[currentQuizIndex];
            const overlay = document.getElementById('feedback-overlay');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-msg');

            const isCorrect = selected === q.answer;
            if (isCorrect) {
                quizScore++;
                overlay.className = "feedback-overlay show correct";
                title.innerText = "🌸 答對了！";
                msg.innerText = q.reason;
            } else {
                overlay.className = "feedback-overlay show incorrect";
                title.innerText = "⚡ 答錯了！";
                msg.innerText = `可惜答錯囉！正確答案是「${q.answer}」。\n${q.reason}`;
            }
        }

        function nextQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < 8) {
                loadQuizQuestion();
            } else {
                showQuizResult();
            }
        }

        function showQuizResult() {
            document.getElementById('quiz-play-box').style.display = 'none';
            const resultStage = document.getElementById('result-stage');
            resultStage.style.display = 'block';

            const finalScore = Math.round((quizScore / 30) * 100);
            let text = "";

            if (finalScore === 100) {
                text = "太不可思議了！你對古代十六個年齡代稱的字音與歲數完全瞭然於胸，實乃博古通今之雋才！";
            } else if (finalScore >= 75) {
                text = `表現優秀！獲得了 ${finalScore} 分。你對大部分的古代年齡代稱都有極佳的認識，已能自如地閱讀文言文中的年齡線索！`;
            } else if (finalScore >= 50) {
                text = `及格通過！獲得了 ${finalScore} 分。部分較生僻的稱呼仍需花費心思記憶，繼續努力！`;
            } else {
                text = `獲得了 ${finalScore} 分。年齡代稱是閱讀文言文的重要線索，建議回到時光探索區再溫習一遍喔！`;
            }

            document.getElementById('result-content').innerText = text;
        }

        function restartQuiz() {
            document.getElementById('quiz-intro').style.display = 'block';
            document.getElementById('result-stage').style.display = 'none';
            document.getElementById('quiz-play-box').style.display = 'none';
        }

        // 初始化
        window.onload = function() {
            initExploreMode();
        };
    </script>
